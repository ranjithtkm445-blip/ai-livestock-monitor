services:
  - type: web
    name: ai-livestock-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "import matplotlib; matplotlib.font_manager._rebuild()"
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
